<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sistem Manajemen Kos-Kosan - Login</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="login.css" />
    <!-- Font Awesome for Icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>
  <body class="login-body">
    <div class="login-card">
      <div class="login-header">
        <i class="fas fa-home login-icon"></i>
        <h2>Sistem Manajemen Kos-Kosan</h2>
      </div>
      <form id="loginForm" class="login-form">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" placeholder="admin" required />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            placeholder="••••••••"
            required
          />
        </div>
        <button type="submit" class="btn btn-primary login-btn">Login</button>
        <div style="text-align: center; margin-top: 15px; font-size: 0.9rem; color: #666;">
          <p>Belum punya akun? <a href="register.html" style="color: #007bff; text-decoration: none; font-weight: 500;">Daftar di sini</a></p>
        </div>
      </form>
    </div>
  <script src="auth.js"></script></body>
</html>
