<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KosKu Management - Laporan</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="laporan.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>
  <body>
    <header class="navbar">
      <div class="navbar-brand">
        <i class="fas fa-home"></i>
        <h1>KosKu Management</h1>
      </div>
      <div class="navbar-user">
        <i class="fas fa-user-circle"></i>
        <span>admin</span>
        <a href="login.html" class="btn btn-danger btn-sm">Logout</a>
      </div>
    </header>

    <div class="app-container">
      <aside class="sidebar">
        <h3 class="sidebar-title">Menu Utama</h3>
        <ul class="sidebar-menu">
          <li>
            <a href="index.html"
              ><i class="fas fa-tachometer-alt"></i> Dashboard</a
            >
          </li>
          <li>
            <a href="kamar.html"><i class="fas fa-door-closed"></i> Kamar</a>
          </li>
          <li>
            <a href="penghuni.html"
              ><i class="fas fa-users"></i> Data Penghuni</a
            >
          </li>
          <li>
            <a href="pembayaran.html"
              ><i class="fas fa-money-bill-wave"></i> Pembayaran</a
            >
          </li>
          <li>
            <a href="pengaduan.html"
              ><i class="fas fa-exclamation-circle"></i> Pengaduan</a
            >
          </li>
          <li class="active">
            <a href="laporan.html"><i class="fas fa-chart-bar"></i> Laporan</a>
          </li>
          <li>
            <a href="user.html"
              ><i class="fas fa-user-cog"></i> Manajemen User</a
            >
          </li>
          <li>
            <a href="notifikasi.html"><i class="fas fa-bell"></i> Notifikasi</a>
          </li>
        </ul>
      </aside>

      <main class="main-content">
        <div class="page-header">
          <h2>Laporan Keuangan</h2>
          <button class="btn btn-primary-light">Generate Laporan</button>
        </div>

        <div class="card laporan-filter mb-4">
          <div class="filter-group">
            <label>Tanggal Mulai</label>
            <div class="input-with-icon">
              <input type="text" placeholder="dd/mm/yyyy" />
              <i class="far fa-calendar-alt"></i>
            </div>
          </div>
          <div class="filter-group">
            <label>Tanggal Akhir</label>
            <div class="input-with-icon">
              <input type="text" placeholder="dd/mm/yyyy" />
              <i class="far fa-calendar-alt"></i>
            </div>
          </div>
          <button class="btn btn-primary action-btn">Tampilkan Laporan</button>
        </div>

        <div class="card total-card mb-4 border-green-left-thick">
          <div class="total-content">
            <span class="total-label text-muted">TOTAL PENDAPATAN</span>
            <h2 class="total-value">Rp 0</h2>
          </div>
        </div>

        <div class="card table-card table-laporan">
          <table class="data-table border-top-none">
            <thead>
              <tr>
                <th>Bulan</th>
                <th>Pendapatan</th>
                <th>Pengeluaran</th>
                <th>Laba Bersih</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td colspan="4" class="text-center empty-state py-4 text-muted">
                  Klik tombol "Generate Laporan" untuk membuat laporan
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </main>
    </div>
    <script src="script.js"></script>
  <script src="auth.js"></script></body>
</html>
